<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gioncyn Vision - PWA Converter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#764ba2">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Mempertahankan warna asli sesuai permintaanmu */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .vg-logo {
            font-size: 3em;
            font-weight: 800;
            color: #764ba2;
            border-right: 3px solid #667eea;
            padding-right: 20px;
            line-height: 1;
        }

        .brand-text { text-align: left; }
        .title { font-size: 1.8em; font-weight: 700; color: #374151; margin-bottom: 2px; }
        .subtitle { color: #6b7280; font-size: 0.8em; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        .upload-area {
            border: 3px dashed #e5e7eb;
            border-radius: 16px;
            padding: 40px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
            background: #f9fafb;
        }

        .upload-area:hover { border-color: #667eea; background: #f0f4ff; }
        .upload-icon { font-size: 3em; margin-bottom: 15px; }
        .upload-text { font-size: 1.1em; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .upload-subtext { color: #9ca3af; font-size: 0.95em; }

        .preview { margin-bottom: 30px; display: none; }
        .preview img { max-width: 100%; max-height: 200px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }

        .format-selector { margin-bottom: 30px; }
        .format-title { font-size: 1em; font-weight: 600; color: #1f2937; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .format-btn {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: #6b7280;
        }

        .format-btn.active { border-color: #667eea; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        .signature { margin-top: 40px; padding-top: 25px; border-top: 1px solid #f3f4f6; text-align: center; }
        .signature .dev-label { display: block; font-size: 0.75em; color: #9ca3af; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .signature .dev-name { font-family: 'Georgia', serif; font-size: 1.4em; font-style: italic; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }

        @media (max-width: 480px) { .vg-logo { font-size: 2.2em; } .title { font-size: 1.4em; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="vg-logo">VG</div>
            <div class="brand-text">
                <h1 class="title">Gioncyn Vision</h1>
                <p class="subtitle">Architecture Solusi Digital</p>
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">Pilih Gambar dari Galeri</div>
            <div class="upload-subtext">Klik atau drag & drop gambar Anda</div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>

        <div class="preview" id="preview">
            <img id="previewImg" alt="Preview">
        </div>

        <div class="format-selector" id="formatSelector" style="display: none;">
            <div class="format-title">Pilih Format Output</div>
            <div class="format-grid">
                <button class="format-btn active" data-format="png">PNG</button>
                <button class="format-btn" data-format="jpg">JPG</button>
                <button class="format-btn" data-format="webp">WEBP</button>
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">📥 Unduh Gambar</button>

        <div class="signature">
            <span class="dev-label">Developer:</span>
            <span class="dev-name">Vivi Gioncyn</span>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
            });
        }

        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const formatSelector = document.getElementById('formatSelector');
        const formatBtns = document.querySelectorAll('.format-btn');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedImage = null;
        let selectedFormat = 'png';

        uploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    preview.style.display = 'block';
                    formatSelector.style.display = 'block';
                    downloadBtn.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedFormat = btn.dataset.format;
            });
        });

        downloadBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const link = document.createElement('a');
                link.download = `GV-Export.${selectedFormat}`;
                link.href = canvas.toDataURL(`image/${selectedFormat === 'jpg' ? 'jpeg' : selectedFormat}`);
                link.click();
            };
            img.src = previewImg.src;
        });
    </script>
</body>
</html>
